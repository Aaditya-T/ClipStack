<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipstack</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="2" width="8" height="4" rx="1" fill="currentColor" opacity="0.7"/>
            <path d="M6 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="9" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">Clipstack</span>
        </div>
        <button class="clear-btn" id="clearBtn" title="Clear history">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6M14 11v6"></path>
          </svg>
          Clear
        </button>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search clipboard history…" autocomplete="off" />
        <button class="search-clear" id="searchClear" title="Clear search">×</button>
      </div>
    </header>

    <div class="content" id="content">
      <div class="section" id="pinnedSection">
        <div class="section-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 1l-4 4-4-4v8l-4 4h16l-4-4V1z"/>
          </svg>
          Pinned
        </div>
        <div class="items-list" id="pinnedList"></div>
      </div>

      <div class="section" id="historySection">
        <div class="section-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Recent
        </div>
        <div class="items-list" id="historyList"></div>
      </div>

      <div class="empty-state" id="emptyState">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.35">
          <rect x="8" y="2" width="8" height="4" rx="1"/>
          <path d="M6 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1"/>
        </svg>
        <p>Nothing copied yet</p>
        <span>Copy any text to get started</span>
      </div>

      <div class="no-results" id="noResults">
        <p>No matches found</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
